<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - Fixed</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-size: 13px; color: #8b949e; text-align: center; margin-bottom: 10px; font-weight: bold; }
        #progress-container { width: 100%; height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: #161b22; border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">BYPASSING SECURITY HEADERS...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Initializing secure tunnel to AI model...</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-in" placeholder="Connecting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        // Using the most stable delivery method for GitHub Pages
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // THE "MAGIC" SETTINGS TO KILL THE UNAUTHORIZED ERROR
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        // This forces the request to be 'cors' and 'anonymous' to bypass the GitHub block
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // Switching to a more "Public" version of the model that Hugging Face allows through CORS
                bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `SYNCING CORE: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● ENGINE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Ready to chat!";
            } catch (e) {
                status.textContent = "SECURITY BLOCK: REFRESH OR USE FIREFOX";
                chat.innerHTML += `<div style="color:#f85149; font-size: 12px; margin-top: 10px;"><b>Error:</b> ${e.message}</div>`;
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "PROCESSING...";

            const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
            
            const out = await bot(prompt, { 
                max_new_tokens: 100, 
                temperature: 0.6, 
                do_sample: true,
                stop: ["<|im_end|>"]
            });

            const reply = out[0].generated_text.split('assistant\n')[1]?.replace('<|im_end|>', '').trim() || "Engine error.";
            
            chat.innerHTML += `<div style="color:#58a6ff; margin: 10px 0;"><b>AI:</b> ${reply}</div>`;
            btn.disabled = false;
            status.textContent = "● ENGINE ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };

        init();
    </script>
</body>
</html>
