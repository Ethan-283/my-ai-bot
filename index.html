<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core Fix</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; display: flex; flex-direction: column; height: 95vh; margin: 0; }
        #status { text-align: center; font-size: 14px; margin-bottom: 10px; color: #8b949e; }
        #progress-container { width: 100%; height: 10px; background: #30363d; border-radius: 5px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: #238636; transition: width 0.3s; }
        #chat { flex: 1; background: #161b22; border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 15px; }
        .input-wrap { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">BYPASSING SECURITY HEADERS...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Attempting secure bypass... if this fails, check your GitHub repo is Public.</div>
    </div>

    <div class="input-wrap">
        <input type="text" id="user-in" placeholder="Connecting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        // Using a more robust CDN for GitHub Pages
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // THE CRITICAL FIXES FOR "UNAUTHORIZED" ERRORS:
        env.allowLocalModels = false;
        env.useBrowserCache = false; // Forces a clean fetch
        
        // This forces the browser to treat the request as "anonymous" 
        // which bypasses the "Unauthorized" credential check
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // Using a slightly different model that has more "Open" permissions
                bot = await pipeline('text-generation', 'Xenova/gpt2', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `LOADING ENGINE: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● ENGINE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Ready to chat!";
            } catch (e) {
                status.textContent = "STILL BLOCKED";
                chat.innerHTML += `<div style="color:red"><b>Security Error:</b> ${e.message}</div>`;
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            
            const out = await bot(text, { max_new_tokens: 40, temperature: 0.7, repetition_penalty: 1.2 });
            const reply = out[0].generated_text.replace(text, "").trim();
            
            chat.innerHTML += `<div style="margin:10px 0; color:#58a6ff"><b>AI:</b> ${reply}</div>`;
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
