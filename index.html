<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

// SETTINGS
env.allowLocalModels = false;
env.useBrowserCache = true;
env.remoteHost = 'https://huggingface.co/';
env.remotePathTemplate = '{model}/resolve/{revision}/';
env.fetch_options = { credentials: 'omit' };

const status = document.getElementById('status');
const progress = document.getElementById('progress-bar');
const chat = document.getElementById('chat');
const userIn = document.getElementById('user-in');
const btn = document.getElementById('send-btn');

let bot;

// 🔥 MEMORY SYSTEM (makes it feel "unlimited")
let history = [
    "You are a helpful, smart AI assistant. Speak clearly and make sense."
];

async function init() {
    try {
        // 🔥 MUCH BETTER MODEL
        bot = await pipeline(
            'text-generation',
            'Xenova/Phi-3-mini-4k-instruct',
            {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `LOADING MODEL: ${Math.round(p.progress)}%`;
                    }
                }
            }
        );

        status.textContent = "● ENGINE READY";
        userIn.disabled = false;
        btn.disabled = false;
        userIn.placeholder = "Talk to me...";

    } catch (e) {
        status.textContent = "ERROR LOADING MODEL";
        console.error(e);
    }
}

async function run() {
    const text = userIn.value.trim();
    if (!text) return;

    chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
    userIn.value = "";
    btn.disabled = true;
    status.textContent = "THINKING...";

    // 🧠 ADD TO MEMORY
    history.push(`User: ${text}`);

    // 🔥 BUILD FULL CONTEXT (VERY HIGH LIMIT)
    let prompt = history.join("\n") + "\nAssistant:";

    const out = await bot(prompt, {
        max_new_tokens: 300,       // 🔥 VERY HIGH RESPONSE LENGTH
        temperature: 0.7,
        top_p: 0.9,
        repetition_penalty: 1.1,
        do_sample: true
    });

    let reply = out[0].generated_text.replace(prompt, '').trim();

    // 🧠 SAVE RESPONSE
    history.push(`Assistant: ${reply}`);

    // 🔥 PREVENT INFINITE MEMORY CRASH
    if (history.length > 20) {
        history.splice(1, 2); // remove oldest messages (keep system prompt)
    }

    chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;

    btn.disabled = false;
    status.textContent = "● ENGINE READY";
    chat.scrollTop = chat.scrollHeight;
}

// CLEAN CACHE ON FIRST RUN
(async () => {
    if (!localStorage.getItem('v18_cleaned')) {
        const dbs = await indexedDB.databases();
        for (let db of dbs) {
            if (db.name.includes('transformers')) {
                await indexedDB.deleteDatabase(db.name);
            }
        }
        localStorage.setItem('v18_cleaned', 'true');
        window.location.reload();
    } else {
        init();
    }
})();

btn.onclick = run;
userIn.onkeypress = (e) => { if (e.key === 'Enter') run(); };
</script>
