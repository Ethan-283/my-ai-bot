<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - Fixed & Smart</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffab70; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: #161b22; border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .reset-btn { background: #da3633; font-size: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status">DETECTING OLD BRAIN...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <button class="reset-btn" onclick="deleteOldAI()">CLICK HERE TO DELETE "NEW YORK CITY" BRAIN</button>

    <div id="chat">
        <div><b>System:</b> Use the red button if the AI is still acting dumb.</div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Waiting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        env.allowLocalModels = false;
        env.useBrowserCache = true; 
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        // FUNCTION TO DELETE THE STUBBORN CACHE
        window.deleteOldAI = async () => {
            const databases = await indexedDB.databases();
            for (let db of databases) {
                if (db.name.includes('transformers')) {
                    indexedDB.deleteDatabase(db.name);
                }
            }
            alert("Old brain deleted! The page will now reload to download the smart one.");
            window.location.reload();
        };

        let bot;

        async function init() {
            try {
                // Switching back to the Smart Instruct model
                bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `DOWNLOADING SMART BRAIN: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● SMART ENGINE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Talk to the smart AI...";
            } catch (e) {
                status.textContent = "CORE BLOCKED";
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "THINKING...";

            // Smart formatting
            const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

            const out = await bot(prompt, { 
                max_new_tokens: 100, 
                temperature: 0.3, // VERY LOW to stop random city names
                repetition_penalty: 1.5,
                do_sample: true,
                stop: ["<|im_end|>"]
            });
            
            let reply = out[0].generated_text.split('assistant\n')[1]?.replace('<|im_end|>', '').trim() || "Try again.";
            chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;
            
            btn.disabled = false;
            status.textContent = "● SMART ENGINE ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
