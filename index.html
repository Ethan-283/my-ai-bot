<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core Final</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #238636; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-weight: bold; margin-bottom: 10px; color: #8b949e; text-align: center; font-size: 14px; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: #161b22; border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="status">CONNECTING TO SECURE ENGINE...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Initializing secure handshake with Hugging Face...</div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Waiting for Engine..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        // Using ESM.sh which handles CORS/Unauthorized errors automatically
        import { pipeline, env } from 'https://esm.sh/@xenova/transformers@2.17.2';

        // FORCE SETTINGS TO BYPASS BROWSER BLOCKS
        env.allowLocalModels = false;
        env.useBrowserCache = true; 
        
        // This tells the AI to use a public mirror if the main one is blocked
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // Using 'SmolLM-135M-Instruct' - the most stable model for Web
                bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `SYNCING CORE: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● ENGINE ONLINE";
                status.style.color = "#3fb950";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Type your message...";
            } catch (e) {
                status.textContent = "CONNECTION BLOCKED";
                chat.innerHTML += `<div style="color:#f85149"><b>Error:</b> ${e.message}</div>`;
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "THINKING...";
            
            const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
            
            try {
                const out = await bot(prompt, { 
                    max_new_tokens: 100, 
                    temperature: 0.7, 
                    do_sample: true,
                    stop: ["<|im_end|>"]
                });
                
                const fullText = out[0].generated_text;
                const reply = fullText.split('assistant\n')[1]?.replace('<|im_end|>', '').trim() || "Engine timed out.";
                
                chat.innerHTML += `<div style="margin-top:10px; color:#adbac7"><b>AI:</b> ${reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div style="color:red">Generation Error.</div>`;
            }

            btn.disabled = false;
            status.textContent = "● ENGINE ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
