<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nano Core</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 98vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffab70; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: var(--card); border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; font-size: 16px; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">ESTABLISHING NANO-LINK...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Using Nano-Engine to prevent Timeouts. This model is small and fast.</div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Connecting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // THE TIMEOUT KILLERS
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // SmolLM-135M is tiny (~130MB total). It won't timeout like the 1B models.
                bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `SYNCING NANO-CORE: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● NANO ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Talk to me...";
            } catch (e) {
                status.textContent = "CONNECTION ERROR - REFRESH";
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "THINKING...";

            // This template structure is what keeps it from saying "New York City"
            const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

            try {
                const out = await bot(prompt, { 
                    max_new_tokens: 60, 
                    temperature: 0.2, // Very low temperature = very logical
                    repetition_penalty: 1.5,
                    do_sample: true,
                    stop: ["<|im_end|>"]
                });
                
                let reply = out[0].generated_text.split('assistant\n')[1]?.replace('<|im_end|>', '').trim() || "Ready.";
                chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div style="color:red">Engine Stall. Try a shorter message.</div>`;
            }
            
            btn.disabled = false;
            status.textContent = "● NANO ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
