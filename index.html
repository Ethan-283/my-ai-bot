<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom AI</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Progress */
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #30363d; text-align: center; }
        #status { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #8b949e; }
        #progress-container { width: 100%; height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        /* Chat Window */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: white; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #30363d; }

        /* Input Bar */
        #input-area { padding: 20px; background: var(--bg); border-top: 1px solid #30363d; display: flex; gap: 10px; }
        input { flex: 1; background: #010409; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div id="status">⚡ Initializing Engine...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
</header>

<div id="chat">
    <div class="msg ai">System: Waiting for model download. This can take up to 1 minute on mobile.</div>
</div>

<div id="input-area">
    <input type="text" id="user-in" placeholder="Loading AI..." disabled>
    <button id="send-btn" disabled>Send</button>
</div>

<script type="module">
    // Using the specific Transformers.js version for best stability
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // FIX FOR GITHUB PAGES / MOBILE SECURITY
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    env.remoteHost = 'https://huggingface.co/';
    env.remotePathTemplate = '{model}/resolve/{revision}/';

    const status = document.getElementById('status');
    const progress = document.getElementById('progress-bar');
    const chat = document.getElementById('chat');
    const userIn = document.getElementById('user-in');
    const btn = document.getElementById('send-btn');

    let bot;

    async function init() {
        try {
            // Using SmolLM-135M-Instruct: Smart, Small, and High Performance
            bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `Downloading Brain: ${Math.round(p.progress)}%`;
                    }
                }
            });

            status.textContent = "● AI Ready (Running Locally)";
            status.style.color = "#3fb950";
            userIn.disabled = false;
            btn.disabled = false;
            userIn.placeholder = "Ask me anything...";
        } catch (e) {
            status.textContent = "❌ Load Failed. Refresh or check connection.";
            console.error(e);
        }
    }

    async function handleChat() {
        const text = userIn.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        userIn.value = "";
        btn.disabled = true;
        status.textContent = "● AI is thinking...";

        // The "Smart" logic: Wrap the text in an Instruct Template
        const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

        const output = await bot(prompt, {
            max_new_tokens: 120,
            temperature: 0.6,
            repetition_penalty: 1.2,
            do_sample: true,
            top_k: 40,
            stop: ["<|im_end|>"]
        });

        // Clean up the text response
        let reply = output[0].generated_text;
        reply = reply.split('<|im_start|>assistant\n')[1]?.replace('<|im_end|>', '').trim() || "I'm not sure how to respond to that.";

        addMsg(reply, 'ai');
        btn.disabled = false;
        status.textContent = "● AI Ready";
    }

    function addMsg(msg, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = msg;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = handleChat;
    userIn.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });

    init();
</script>

</body>
</html>
