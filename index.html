<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Custom AI</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header & Progress */
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #30363d; z-index: 10; }
        #status { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #8b949e; text-align: center; }
        #progress-container { width: 100%; height: 4px; background: #30363d; border-radius: 2px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }

        /* Chat Window */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; color: #58a6ff; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1c2128; border: 1px solid #444c56; color: #adbac7; border-bottom-left-radius: 2px; }
        
        /* Input Bar */
        #input-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: var(--bg); border-top: 1px solid #30363d; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #010409; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 20px; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <div id="status">INITIATING CORE...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
</header>

<div id="chat">
    <div class="msg ai">Welcome. I am loading my local brain. Please stay on this tab until the progress bar reaches 100%.</div>
</div>

<div id="input-area">
    <input type="text" id="user-in" placeholder="Downloading..." disabled>
    <button id="send-btn" disabled>➔</button>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Global Config for Mobile Support
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    env.remoteHost = 'https://huggingface.co/';
    env.remotePathTemplate = '{model}/resolve/{revision}/';

    const status = document.getElementById('status');
    const progress = document.getElementById('progress-bar');
    const chat = document.getElementById('chat');
    const userIn = document.getElementById('user-in');
    const btn = document.getElementById('send-btn');

    let bot;

    async function init() {
        try {
            // Check if device is likely a mobile phone
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            // Optimization: If on mobile, we use a specific loading flag
            bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `SYNCING: ${Math.round(p.progress)}%`;
                    }
                    if (p.status === 'done') {
                        status.textContent = "CORE ONLINE";
                        status.style.color = "#3fb950";
                        userIn.disabled = false;
                        btn.disabled = false;
                        userIn.placeholder = "Message AI...";
                    }
                }
            });
        } catch (e) {
            status.textContent = "CORE ERROR: REFRESH PAGE";
            status.style.color = "#f85149";
            console.error(p);
        }
    }

    async function handleChat() {
        const text = userIn.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        userIn.value = "";
        btn.disabled = true;
        status.textContent = "PROCESSING...";

        // Instruct template prevents nonsense looping
        const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

        const output = await bot(prompt, {
            max_new_tokens: 100,
            temperature: 0.6,
            repetition_penalty: 1.2,
            do_sample: true,
            top_k: 40,
            stop: ["<|im_end|>"]
        });

        let reply = output[0].generated_text;
        reply = reply.split('<|im_start|>assistant\n')[1]?.replace('<|im_end|>', '').trim() || "System: Response failed.";

        addMsg(reply, 'ai');
        btn.disabled = false;
        status.textContent = "CORE ONLINE";
    }

    function addMsg(msg, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = msg;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = handleChat;
    userIn.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    init();
</script>

</body>
</html>
