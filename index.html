<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - Zero Auth</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffab70; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: var(--card); border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">STRIPPING AUTH HEADERS...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Forcing anonymous handshake to bypass the Unauthorized error.</div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Connecting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // THE "UNAUTHORIZED" KILLER
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        // This configuration forces the browser to ignore GitHub's credentials
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';
        
        // CUSTOM FETCH CONFIG: This is the secret sauce
        env.fetch_options = {
            mode: 'cors',
            credentials: 'omit' // This tells the browser: "Don't send ANY cookies/auth"
        };

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // We use GPT-2 for this test because it's the most "publicly" open file
                bot = await pipeline('text-generation', 'Xenova/gpt2', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `DOWNLOADING: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● CORE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Say hello...";
            } catch (e) {
                status.textContent = "CORE BLOCKED: TRY INCOGNITO";
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "THINKING...";

            // Temperature 0.1 stops the "New York City" hallucination
            const out = await bot(text, { 
                max_new_tokens: 30, 
                temperature: 0.1, 
                repetition_penalty: 2.0 
            });
            
            const reply = out[0].generated_text.replace(text, "").trim();
            chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply || "..."}</div>`;
            
            btn.disabled = false;
            status.textContent = "● CORE ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
