<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core v4</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; padding: 20px; text-align: center; }
        #status { font-weight: bold; color: #8b949e; margin-bottom: 10px; }
        #progress-container { width: 100%; height: 10px; background: #30363d; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #238636; transition: width 0.2s; }
        #chat { height: 300px; background: #161b22; border: 1px solid #30363d; overflow-y: auto; padding: 15px; text-align: left; margin-bottom: 15px; border-radius: 8px; }
        input { width: 70%; padding: 12px; border-radius: 5px; border: 1px solid #30363d; background: #010409; color: white; }
        button { padding: 12px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { opacity: 0.3; }
        .error-msg { color: #f85149; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="status">INITIATING...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> If this page is blank, check your internet. Loading AI scripts...</div>
    </div>

    <input type="text" id="user-in" placeholder="Loading..." disabled>
    <button id="send-btn" disabled>Send</button>
    
    <div id="debug" class="error-msg"></div>

    <script type="module">
        // Using a direct, stable CDN link
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');
        const debug = document.getElementById('debug');

        // Force HuggingFace connection
        env.allowLocalModels = false;
        env.useBrowserCache = false; // Forces fresh files to fix the blank page issue

        let bot;

        async function init() {
            try {
                status.textContent = "CONNECTING TO HUGGINGFACE...";
                
                bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `DOWNLOADING: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "CORE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Ask anything...";
            } catch (e) {
                status.textContent = "LOAD ERROR";
                debug.textContent = e.message;
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            
            const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
            const out = await bot(prompt, { max_new_tokens: 50, temperature: 0.6, do_sample: true });
            const reply = out[0].generated_text.split('assistant\n')[1]?.trim() || "No response.";
            
            chat.innerHTML += `<div><b>AI:</b> ${reply}</div>`;
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
