<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core v11 - Clean Install</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 98vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffab70; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: var(--card); border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .warning { color: #f85149; font-size: 12px; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="status">WIPING CORRUPTED CACHE...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="warning">Wait for the green bar. Do not close the tab.</div>
    
    <div id="chat">
        <div><b>System:</b> Forcing a fresh English-only install to stop the gibberish.</div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Downloading..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // 1. KILL THE OLD DATA
        async function nukeCache() {
            const dbs = await indexedDB.databases();
            for (let db of dbs) {
                if (db.name.includes('transformers')) {
                    await indexedDB.deleteDatabase(db.name);
                    console.log("Deleted old AI brain:", db.name);
                }
            }
        }

        // 2. SET UP THE NEW ENVIRONMENT
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // We use TinyLlama because it is the most stable English model for browsers
                bot = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `DOWNLOADING NEW BRAIN: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● SMART CORE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Say hello...";
            } catch (e) {
                status.textContent = "CORE BLOCKED - REFRESH PAGE";
                console.error(e);
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "THINKING...";

            // This specific template forces the AI to be an assistant, not a book completer
            const prompt = `<|system|>\nYou are a helpful AI assistant. Respond only in English.</s>\n<|user|>\n${text}</s>\n<|assistant|>\n`;

            const out = await bot(prompt, { 
                max_new_tokens: 80, 
                temperature: 0.4, 
                do_sample: true,
                repetition_penalty: 1.5,
                stop: ["</s>"]
            });
            
            let reply = out[0].generated_text.split('<|assistant|>\n')[1]?.replace('</s>', '').trim() || "I am thinking...";
            chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;
            
            btn.disabled = false;
            status.textContent = "● SMART CORE ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        // STARTUP LOGIC
        (async () => {
            // If the AI was acting crazy, we nuke it once.
            if (!localStorage.getItem('first_clean_v11')) {
                await nukeCache();
                localStorage.setItem('first_clean_v11', 'true');
                window.location.reload();
            } else {
                init();
            }
        })();

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
    </script>
</body>
</html>
