<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Threaded Core</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffab70; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: var(--card); border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">INITIALIZING BACKGROUND THREAD...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> AI is running on a separate thread to prevent freezing.</div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Loading..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        // 1. Create the AI Worker (The "Background Thread")
        const workerCode = `
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
            env.allowLocalModels = false;
            env.useBrowserCache = true;
            env.remoteHost = 'https://huggingface.co/';
            env.remotePathTemplate = '{model}/resolve/{revision}/';

            let bot;
            self.onmessage = async (e) => {
                if (e.data.type === 'init') {
                    bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                        progress_callback: (p) => { self.postMessage({ type: 'progress', data: p }); }
                    });
                    self.postMessage({ type: 'ready' });
                } else if (e.data.type === 'chat') {
                    const prompt = \`<|im_start|>user\\n\${e.data.text}<|im_end|>\\n<|im_start|>assistant\\n\`;
                    const out = await bot(prompt, { 
                        max_new_tokens: 50, temperature: 0.2, repetition_penalty: 1.5, do_sample: true, stop: ["<|im_end|>"] 
                    });
                    const reply = out[0].generated_text.split('assistant\\n')[1]?.replace('<|im_end|>', '').trim();
                    self.postMessage({ type: 'reply', text: reply });
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob), { type: 'module' });

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        // 2. Handle Communication with the Worker
        worker.onmessage = (e) => {
            const { type, data, text } = e.data;
            if (type === 'progress' && data.status === 'progress') {
                progress.style.width = data.progress + '%';
                status.textContent = \`SYNCING: \${Math.round(data.progress)}%\`;
            } else if (type === 'ready') {
                status.textContent = "● ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Talk to me...";
            } else if (type === 'reply') {
                addMsg(text, 'ai');
                btn.disabled = false;
                status.textContent = "● ONLINE";
            }
        };

        function addMsg(msg, role) {
            const div = document.createElement('div');
            div.innerHTML = \`<b>\${role === 'user' ? 'You' : 'AI'}:</b> \${msg}\`;
            div.style.marginTop = "10px";
            if(role === 'ai') div.style.color = "#58a6ff";
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const text = userIn.value.trim();
            if(!text) return;
            addMsg(text, 'user');
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "AI IS THINKING...";
            worker.postMessage({ type: 'chat', text });
        }

        btn.onclick = send;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') send(); };
        
        // Start the worker
        worker.postMessage({ type: 'init' });
    </script>
</body>
</html>
