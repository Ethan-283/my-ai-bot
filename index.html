<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

// SETTINGS (safe + stable)
env.allowLocalModels = false;
env.useBrowserCache = true;
env.remoteHost = 'https://huggingface.co/';
env.remotePathTemplate = '{model}/resolve/{revision}/';
env.fetch_options = { credentials: 'omit' };

const status = document.getElementById('status');
const progress = document.getElementById('progress-bar');
const chat = document.getElementById('chat');
const userIn = document.getElementById('user-in');
const btn = document.getElementById('send-btn');

let bot;

// MEMORY (makes it feel smarter)
let history = [
    "You are a helpful AI assistant. Respond clearly and make sense."
];

async function init() {
    try {
        status.textContent = "LOADING MODEL...";

        // ✅ RELIABLE MODEL (won’t get blocked like Phi-3)
        bot = await pipeline(
            'text-generation',
            'Xenova/SmolLM2-360M-Instruct',
            {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `LOADING: ${Math.round(p.progress)}%`;
                    }
                }
            }
        );

        status.textContent = "● ENGINE READY";
        userIn.disabled = false;
        btn.disabled = false;
        userIn.placeholder = "Talk to me...";

    } catch (e) {
        status.textContent = "ERROR: " + e.message;
        console.error(e);
    }
}

async function run() {
    const text = userIn.value.trim();
    if (!text) return;

    chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
    userIn.value = "";
    btn.disabled = true;
    status.textContent = "THINKING...";

    // Add to memory
    history.push(`User: ${text}`);

    // Build prompt
    let prompt = history.join("\n") + "\nAssistant:";

    try {
        const out = await bot(prompt, {
            max_new_tokens: 200,
            temperature: 0.7,
            top_p: 0.9,
            repetition_penalty: 1.1,
            do_sample: true
        });

        let reply = out[0].generated_text.replace(prompt, '').trim();

        if (!reply) reply = "I’m not sure how to respond to that.";

        // Save response
        history.push(`Assistant: ${reply}`);

        // Prevent crashes (keeps memory but trims old messages)
        if (history.length > 20) {
            history.splice(1, 2);
        }

        chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;

    } catch (e) {
        console.error(e);
        chat.innerHTML += `<div style="color:red;"><b>Error:</b> Failed to generate response.</div>`;
        status.textContent = "GENERATION ERROR";
    }

    btn.disabled = false;
    status.textContent = "● ENGINE READY";
    chat.scrollTop = chat.scrollHeight;
}

// CLEAN CACHE ON FIRST RUN
(async () => {
    if (!localStorage.getItem('ai_cleaned_v2')) {
        try {
            const dbs = await indexedDB.databases();
            for (let db of dbs) {
                if (db.name && db.name.includes('transformers')) {
                    await indexedDB.deleteDatabase(db.name);
                }
            }
        } catch (e) {
            console.warn("Cache cleanup failed:", e);
        }

        localStorage.setItem('ai_cleaned_v2', 'true');
        window.location.reload();
    } else {
        init();
    }
})();

// EVENTS
btn.onclick = run;
userIn.onkeypress = (e) => { if (e.key === 'Enter') run(); };
</script>
