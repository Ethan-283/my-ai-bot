<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - GitHub Stable</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffab70; }
        #progress-container { width: 100%; height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: var(--card); border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">BYPASSING FIREWALL...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Connecting to Nano-Engine. If this fails, try disabling AdBlock.</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-in" placeholder="Loading..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // THE GITHUB PAGES BYPASS
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // Using the most "Public" model path to avoid Unauthorized errors
                bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `SYNCING: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Talk to the AI...";
            } catch (e) {
                status.textContent = "CONNECTION BLOCKED";
                console.error("AI Error:", e);
                chat.innerHTML += `<div style="color:red; font-size:10px;">Error: ${e.message}</div>`;
            }
        }

        async function handleChat() {
            const text = userIn.value.trim();
            if(!text) return;
            
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "GENERATING...";

            // Lock logic to stop "New York City" hallucination
            const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

            try {
                const out = await bot(prompt, { 
                    max_new_tokens: 50, 
                    temperature: 0.2, 
                    repetition_penalty: 1.5,
                    do_sample: true,
                    stop: ["<|im_end|>"]
                });
                
                let reply = out[0].generated_text.split('assistant\n')[1]?.replace('<|im_end|>', '').trim() || "Ready.";
                chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div style="color:red">Handshake Lost. Try again.</div>`;
            }

            btn.disabled = false;
            status.textContent = "● ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = handleChat;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
        init();
    </script>
</body>
</html>
