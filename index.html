<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Logic AI</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1b; color: #d7dadc; padding: 20px; }
        #chat { height: 400px; border: 1px solid #343536; overflow-y: auto; padding: 15px; background: #030303; margin-bottom: 10px; border-radius: 4px; }
        #status { font-size: 12px; color: #818384; margin-bottom: 10px; }
        .input-box { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #272729; border: 1px solid #343536; color: white; border-radius: 4px; }
        button { padding: 10px 20px; background: #0079d3; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
        .u { color: #4fbcff; margin-top: 10px; }
        .a { color: #ff4500; margin-bottom: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="status">Loading Engine... (Check Console if stuck)</div>
    <div id="chat"></div>

    <div class="input-box">
        <input type="text" id="user-in" placeholder="Wait for 'Ready'..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Bypass security blocks
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const status = document.getElementById('status');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const sendBtn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // Using 'Qwen1.5-0.5B-Chat' - It's built for conversation
                bot = await pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat');
                status.textContent = "Status: Ready";
                userIn.disabled = false;
                sendBtn.disabled = false;
                userIn.placeholder = "Type a message...";
            } catch (e) {
                status.textContent = "Error: Use Firefox or Live Server.";
            }
        }

        async function run() {
            const input = userIn.value.trim();
            if (!input) return;

            chat.innerHTML += `<div class="u"><b>You:</b> ${input}</div>`;
            userIn.value = "";
            sendBtn.disabled = true;
            status.textContent = "Status: Thinking...";

            // THE FIX: Format the input so the AI knows it's a conversation
            const prompt = `<|im_start|>user\n${input}<|im_end|>\n<|im_start|>assistant\n`;

            const out = await bot(prompt, {
                max_new_tokens: 50,
                temperature: 0.5,      // Lower temperature = less "random stuff"
                repetition_penalty: 1.2,
                do_sample: true,
                top_k: 20,             // Limits vocabulary to top 20 likely words
                stop: ["<|im_end|>", "<|endoftext|>"] // Tells it exactly when to shut up
            });

            // Clean the output
            let reply = out[0].generated_text;
            reply = reply.split('<|im_start|>assistant\n')[1] || reply;
            reply = reply.replace('<|im_end|>', '').trim();

            chat.innerHTML += `<div class="a"><b>AI:</b> ${reply}</div>`;
            status.textContent = "Status: Ready";
            sendBtn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }

        sendBtn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
