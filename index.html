<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core v3</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #30363d; text-align: center; }
        #status { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #8b949e; }
        #progress-container { width: 100%; height: 4px; background: #30363d; border-radius: 2px; margin-bottom: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; color: #58a6ff; }
        .ai { align-self: flex-start; background: #1c2128; border: 1px solid #444c56; }
        #input-area { padding: 15px; background: var(--bg); border-top: 1px solid #30363d; display: flex; gap: 10px; }
        input { flex: 1; background: #010409; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
        .reset-btn { background: #da3633; font-size: 10px; margin-top: 5px; padding: 5px 10px; }
    </style>
</head>
<body>

<header>
    <div id="status">INITIATING CORE...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <button class="reset-btn" onclick="clearAICache()">FORCE CACHE CLEAR</button>
</header>

<div id="chat">
    <div class="msg ai">Welcome. If the bar stops moving, click "FORCE CACHE CLEAR" and refresh.</div>
</div>

<div id="input-area">
    <input type="text" id="user-in" placeholder="Connecting..." disabled>
    <button id="send-btn" disabled>Send</button>
</div>

<script type="module">
    // Using a different CDN (esm.sh) which is often more stable for GitHub Pages
    import { pipeline, env } from 'https://esm.sh/@xenova/transformers@2.17.2';

    env.allowLocalModels = false;
    // We start with cache ENABLED, but our reset button can clear it
    env.useBrowserCache = true;
    env.remoteHost = 'https://huggingface.co/';
    env.remotePathTemplate = '{model}/resolve/{revision}/';

    const status = document.getElementById('status');
    const progress = document.getElementById('progress-bar');
    const chat = document.getElementById('chat');
    const userIn = document.getElementById('user-in');
    const btn = document.getElementById('send-btn');

    // Global clear function
    window.clearAICache = async () => {
        const cacheName = 'transformers-cache';
        if (window.caches) {
            await caches.delete(cacheName);
            alert("Cache cleared! Page will now reload.");
            window.location.reload();
        }
    };

    let bot;

    async function init() {
        try {
            // Using a slightly more robust model path
            bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `LOADING: ${Math.round(p.progress)}%`;
                    }
                }
            });
            status.textContent = "CORE ONLINE";
            userIn.disabled = false;
            btn.disabled = false;
            userIn.placeholder = "Message AI...";
        } catch (e) {
            status.textContent = "CORE ERROR: CLICK RESET";
            console.error(e);
        }
    }

    async function handleChat() {
        const text = userIn.value.trim();
        if (!text) return;
        addMsg(text, 'user');
        userIn.value = "";
        btn.disabled = true;
        status.textContent = "THINKING...";

        const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
        const output = await bot(prompt, { max_new_tokens: 100, temperature: 0.6, repetition_penalty: 1.2, do_sample: true });
        
        let reply = output[0].generated_text.split('<|im_start|>assistant\n')[1]?.replace('<|im_end|>', '').trim() || "Error in response.";
        addMsg(reply, 'ai');
        btn.disabled = false;
        status.textContent = "CORE ONLINE";
    }

    function addMsg(msg, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = msg;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = handleChat;
    userIn.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
    init();
</script>
</body>
</html>
