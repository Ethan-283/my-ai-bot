<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Core</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #30363d; text-align: center; }
        #status { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #8b949e; }
        #progress-bar { width: 0%; height: 4px; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #21262d; border: 1px solid #30363d; color: #58a6ff; }
        .ai { align-self: flex-start; background: #1c2128; border: 1px solid #444c56; }
        #input-area { padding: 15px; background: var(--bg); border-top: 1px solid #30363d; display: flex; gap: 10px; }
        input { flex: 1; background: #010409; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <div id="status">CONNECTING...</div>
    <div style="width:100%; background:#30363d; height:4px;"><div id="progress-bar"></div></div>
</header>

<div id="chat">
    <div class="msg ai">System: Loading "SmolLM" Smart Engine. This may take 30-60 seconds on the first load.</div>
</div>

<div id="input-area">
    <input type="text" id="user-in" placeholder="Downloading brain..." disabled>
    <button id="send-btn" disabled>Send</button>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // FIX FOR GITHUB PAGES & MOBILE SECURITY
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    env.remoteHost = 'https://huggingface.co/';
    env.remotePathTemplate = '{model}/resolve/{revision}/';

    const status = document.getElementById('status');
    const progress = document.getElementById('progress-bar');
    const chat = document.getElementById('chat');
    const userIn = document.getElementById('user-in');
    const btn = document.getElementById('send-btn');

    let bot;

    async function init() {
        try {
            // Using SmolLM-135M-Instruct: Small enough for phones, smart enough for logic
            bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `LOADING: ${Math.round(p.progress)}%`;
                    }
                }
            });
            status.textContent = "● ONLINE";
            status.style.color = "#3fb950";
            userIn.disabled = false;
            btn.disabled = false;
            userIn.placeholder = "Message your AI...";
        } catch (e) {
            status.textContent = "CONNECTION ERROR";
            console.error(e);
        }
    }

    async function handleChat() {
        const text = userIn.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        userIn.value = "";
        btn.disabled = true;
        status.textContent = "THINKING...";

        // PROMPT TEMPLATE: This is the "Secret Sauce" that makes it smart
        const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

        const output = await bot(prompt, {
            max_new_tokens: 100,
            temperature: 0.4,       // Lower = more focused and less "random"
            repetition_penalty: 1.3, // Stops the AI from repeating itself
            do_sample: true,
            top_k: 40,
            stop: ["<|im_end|>", "<|endoftext|>"]
        });

        // CLEANING THE TEXT: Removes the template tags from the final view
        let reply = output[0].generated_text;
        reply = reply.split('assistant\n')[1]?.replace('<|im_end|>', '').trim() || "I'm not sure how to answer that.";

        addMsg(reply, 'ai');
        btn.disabled = false;
        status.textContent = "● ONLINE";
    }

    function addMsg(msg, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = msg;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = handleChat;
    userIn.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    init();
</script>
</body>
</html>
