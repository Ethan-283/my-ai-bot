<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - GitHub Edition</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #status { font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #8b949e; }
        #progress-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #chat { flex: 1; background: #161b22; border: 1px solid #30363d; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .input-wrap { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="status">BYPASSING GITHUB CORS...</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="chat">
        <div><b>System:</b> Using Worker-thread to bypass security headers.</div>
    </div>

    <div class="input-wrap">
        <input type="text" id="user-in" placeholder="Connecting..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        // Using the most compatible CDN for GitHub Pages
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // THE "UNAUTHORIZED" KILLER SETTINGS
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        // This forces the request to be 'anonymous', which stops the "Unauthorized" error
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const chat = document.getElementById('chat');
        const userIn = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        let bot;

        async function init() {
            try {
                // Switching to 'Xenova/TinyLlama-1.1B-Chat-v1.0' 
                // It is very smart and usually has high-priority "Public" access
                bot = await pipeline('text-generation', 'Xenova/TinyLlama-1.1B-Chat-v1.0', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progress.style.width = p.progress + '%';
                            status.textContent = `SYNCING CORE: ${Math.round(p.progress)}%`;
                        }
                    }
                });

                status.textContent = "● ENGINE ONLINE";
                userIn.disabled = false;
                btn.disabled = false;
                userIn.placeholder = "Message your AI...";
            } catch (e) {
                // If it fails, we show the EXACT error so we can fix it
                status.textContent = "CORE BLOCKED";
                chat.innerHTML += `<div style="color:red; font-size:12px"><b>Handshake Error:</b> ${e.message}</div>`;
            }
        }

        async function run() {
            const text = userIn.value.trim();
            if(!text) return;
            chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
            userIn.value = "";
            btn.disabled = true;
            status.textContent = "THINKING...";

            // TinyLlama specific prompt format
            const prompt = `<|system|>\nYou are a helpful AI assistant.</s>\n<|user|>\n${text}</s>\n<|assistant|>\n`;

            const out = await bot(prompt, { 
                max_new_tokens: 100, 
                temperature: 0.7, 
                do_sample: true 
            });
            
            const reply = out[0].generated_text.split('<|assistant|>\n')[1]?.trim() || "Error generating response.";
            chat.innerHTML += `<div style="color:#58a6ff; margin-top:10px;"><b>AI:</b> ${reply}</div>`;
            
            btn.disabled = false;
            status.textContent = "● ENGINE ONLINE";
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = run;
        userIn.onkeypress = (e) => { if(e.key === 'Enter') run(); };
        init();
    </script>
</body>
</html>
