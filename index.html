<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // FIX 1: Tell the engine to ignore the broken cache temporarily
    env.allowLocalModels = false;
    env.useBrowserCache = false; // Forces a fresh download to fix the "Load Failed"
    env.remoteHost = 'https://huggingface.co/';
    env.remotePathTemplate = '{model}/resolve/{revision}/';

    const status = document.getElementById('status');
    const progress = document.getElementById('progress-bar');
    const userIn = document.getElementById('user-in');
    const btn = document.getElementById('send-btn');

    let bot;

    async function init() {
        try {
            status.textContent = "CLEANING & SYNCING...";
            
            // FIX 2: Using a slightly different model path that is more stable on GitHub Pages
            bot = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        progress.style.width = p.progress + '%';
                        status.textContent = `FRESH DOWNLOAD: ${Math.round(p.progress)}%`;
                    }
                }
            });

            status.textContent = "● CORE ONLINE";
            userIn.disabled = false;
            btn.disabled = false;
            // After one successful load, you can change 'useBrowserCache' back to true
        } catch (e) {
            status.textContent = "CRITICAL ERROR: CHECK CONSOLE";
            console.error("AI Error:", e);
        }
    }
    
    // ... (Keep your existing handleChat and addMsg functions)
    init();
</script>
